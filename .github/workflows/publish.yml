name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      - name: Use CI npm config
        run: cp .npmrc.ci .npmrc

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Snow CLI ${{ github.ref_name }}

            ### What's New

            - Add AI completion duration tracking with updated status messages
            - Enhance MessageRenderer with memoization and parallel group handling for smoother rendering
            - Optimize session rollback experience by clearing context usage and unifying confirmation titles across languages
            - Add "Install from GitHub" option to skills creation for easier skill discovery
            - Improve sub-agent UI clarity by hiding persisted content/thinking messages and skipping teammate messages
            - Enhance child process options to support `abortResult` for graceful shutdowns
            - Enhance `filesystem-create` tool to support batch file creation and add content parameter validation

            ### Installation
            ```bash
            npm install -g snow-ai
            ```

            ### Usage
            ```bash
            snow
            ```
            ### Update
            ```bash
            snow --update
            ```
          draft: false
          prerelease: false
